services:
  db:
    image: postgres:16
    container_name: finsight_db
    restart: always
    environment:
      POSTGRES_USER: finsight_user
      POSTGRES_PASSWORD: finsight_pass
      POSTGRES_DB: finsight
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
